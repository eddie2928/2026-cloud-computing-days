<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AgentBox HITL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 55%; border-right: 1px solid #333; overflow-y: auto; }
  #detail { width: 45%; padding: 16px; overflow-y: auto; }
  h2 { padding: 12px 16px; background: #222; border-bottom: 1px solid #333; font-size: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: #2a2a2a; padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; position: sticky; top: 0; }
  td { padding: 6px 12px; border-bottom: 1px solid #2a2a2a; cursor: pointer; }
  tr:hover td { background: #252525; }
  tr.selected td { background: #1e3a5f; }
  .status-pending  { color: #f0c040; }
  .status-allowed  { color: #4caf50; }
  .status-blocked  { color: #f44336; }
  .status-failed   { color: #9e9e9e; }
  #detail-header { font-size: 13px; margin-bottom: 12px; }
  #detail-header span { display: block; margin-bottom: 4px; }
  pre { background: #111; padding: 12px; border-radius: 4px; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
  .btn { padding: 8px 20px; margin: 4px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
  .btn-allow { background: #4caf50; color: #fff; }
  .btn-block { background: #f44336; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  #status-bar { padding: 6px 16px; background: #222; border-bottom: 1px solid #333; font-size: 11px; color: #888; }
  .empty { padding: 24px; color: #555; text-align: center; }
</style>
</head>
<body>
<div id="sidebar">
  <h2>AgentBox — HITL Intercept</h2>
  <div id="status-bar">WebSocket: 연결 중...</div>
  <table>
    <thead><tr>
      <th>시각</th><th>메서드</th><th>URL</th><th>상태</th>
    </tr></thead>
    <tbody id="event-list"></tbody>
  </table>
  <div id="empty-hint" class="empty">요청을 기다리는 중...</div>
</div>
<div id="detail">
  <h2>상세 정보</h2>
  <div id="detail-body">
    <p class="empty">좌측 항목을 클릭하세요.</p>
  </div>
</div>

<script>
const events = {};
let selectedId = null;

const list = document.getElementById('event-list');
const detail = document.getElementById('detail-body');
const statusBar = document.getElementById('status-bar');
const emptyHint = document.getElementById('empty-hint');

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('ko-KR');
}
function statusClass(s) { return 'status-' + s; }

function renderRow(ev) {
  let tr = document.getElementById('row-' + ev.id);
  if (!tr) {
    tr = document.createElement('tr');
    tr.id = 'row-' + ev.id;
    tr.onclick = () => select(ev.id);
    list.prepend(tr);
  }
  tr.innerHTML = `
    <td>${fmtTime(ev.created_at)}</td>
    <td>${ev.method}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${ev.url}">${ev.url}</td>
    <td class="${statusClass(ev.status)}">${ev.status}</td>
  `;
  if (selectedId === ev.id) tr.classList.add('selected');
}

function select(id) {
  selectedId = id;
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
  const tr = document.getElementById('row-' + id);
  if (tr) tr.classList.add('selected');
  renderDetail(events[id]);
}

function renderDetail(ev) {
  if (!ev) { detail.innerHTML = '<p class="empty">항목 없음</p>'; return; }
  const isPending = ev.status === 'pending';
  detail.innerHTML = `
    <div id="detail-header">
      <span><b>ID:</b> ${ev.id}</span>
      <span><b>상태:</b> <span class="${statusClass(ev.status)}">${ev.status}</span></span>
      <span><b>시각:</b> ${ev.created_at}</span>
      <span><b>메서드:</b> ${ev.method} ${ev.url}</span>
    </div>
    <p style="margin-bottom:6px;font-size:12px"><b>Prompt Excerpt:</b></p>
    <pre>${escHtml(ev.prompt_excerpt || '')}</pre>
    <p style="margin:8px 0 4px;font-size:12px"><b>Request Body:</b></p>
    <pre>${escHtml(ev.request_body || '(없음)')}</pre>
    <div style="margin-top:16px">
      <button class="btn btn-allow" id="btn-allow" ${isPending ? '' : 'disabled'} onclick="verdict('${ev.id}','allow')">Allow</button>
      <button class="btn btn-block" id="btn-block" ${isPending ? '' : 'disabled'} onclick="verdict('${ev.id}','block')">Block</button>
    </div>
  `;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function verdict(id, decision) {
  document.getElementById('btn-allow').disabled = true;
  document.getElementById('btn-block').disabled = true;
  await fetch('/verdict/' + id, {
    method: 'POST',
    headers: {'content-type': 'application/json'},
    body: JSON.stringify({decision})
  });
}

function connect() {
  const ws = new WebSocket('ws://' + location.host + '/ws');
  ws.onopen = () => { statusBar.textContent = 'WebSocket: 연결됨'; };
  ws.onclose = () => {
    statusBar.textContent = 'WebSocket: 재연결 중...';
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    const ev = msg.event;
    events[ev.id] = ev;
    emptyHint.style.display = 'none';
    renderRow(ev);
    if (selectedId === ev.id) renderDetail(ev);
  };
}

// Load existing events on page load
fetch('/events').then(r => r.json()).then(rows => {
  rows.reverse().forEach(row => {
    const ev = {
      id: row.id,
      created_at: row.created_at,
      method: row.method,
      url: row.url,
      request_body: row.request_body,
      prompt_excerpt: row.prompt_excerpt,
      status: row.status,
    };
    events[ev.id] = ev;
    renderRow(ev);
  });
  if (rows.length) emptyHint.style.display = 'none';
});

connect();
</script>
</body>
</html>
