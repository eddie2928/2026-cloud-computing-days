# 1D-2: SOPS configuration - all files encrypted with KMS CMK
# Replace {region}, {account_id}, {key_id} with actual values after terraform apply.
# Example: arn:aws:kms:us-east-1:123456789012:key/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
creation_rules:
  - path_regex: .*
    kms: "arn:aws:kms:{region}:{account_id}:key/{key_id}"
