<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">paper · backgrounds</div>
  <div class="row" style="gap: 10px;">
    <div class="swatch"><div class="chip" style="background:#FBF7EE"></div><div class="name">--paper-bone</div><div class="hex">#FBF7EE</div></div>
    <div class="swatch"><div class="chip" style="background:#FAF8F2"></div><div class="name">--paper-mist</div><div class="hex">#FAF8F2</div></div>
    <div class="swatch"><div class="chip" style="background:#F6EFDF"></div><div class="name">--paper-cream</div><div class="hex">#F6EFDF</div></div>
    <div class="swatch"><div class="chip" style="background:#EFE6D0"></div><div class="name">--paper-warm</div><div class="hex">#EFE6D0</div></div>
  </div>
  <div class="meta">layered surfaces get <em>warmer</em>, not darker</div>
</div></body></html>
