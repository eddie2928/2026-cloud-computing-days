<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">brand · motifs · lines & dots</div>
  <div style="display:flex; flex-direction:column; gap:18px; padding:4px 0;">
    <div>
      <div class="meta" style="margin-bottom:8px;">dot leader</div>
      <div class="hr-dots" style="width:100%"></div>
    </div>
    <div>
      <div class="meta" style="margin-bottom:8px;">hairline</div>
      <hr class="hr-line" style="margin:0;width:100%"/>
    </div>
    <div>
      <div class="meta" style="margin-bottom:8px;">dot grid · backgrounds (24px pitch)</div>
      <div style="height:90px; border-radius:12px; background-color: var(--paper-bone); background-image: radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0); background-size: 24px 24px; border:1px solid var(--line-faint);"></div>
    </div>
    <div>
      <div class="meta" style="margin-bottom:8px;">streak strip · five completed days</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <span style="width:14px;height:14px;border-radius:999px;background:var(--gold-warm); box-shadow:0 1px 2px rgba(94,70,30,0.2);"></span>
        <span style="width:14px;height:14px;border-radius:999px;background:var(--gold-warm);"></span>
        <span style="width:14px;height:14px;border-radius:999px;background:var(--gold-warm);"></span>
        <span style="width:14px;height:14px;border-radius:999px;background:var(--gold-soft); border:1.5px solid var(--gold);"></span>
        <span style="width:14px;height:14px;border-radius:999px;background:transparent; border:1.5px dashed var(--line-strong);"></span>
        <span class="meta" style="margin-left:10px;">3 saved · today · tomorrow</span>
      </div>
    </div>
  </div>
</div></body></html>
