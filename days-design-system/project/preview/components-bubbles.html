<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card" style="gap:14px;">
  <div class="label">components · chat bubbles</div>
  <style>
    .row-ai{display:flex; gap:10px; align-items:flex-start;}
    .row-us{display:flex; gap:10px; align-items:flex-start; justify-content:flex-end;}
    .av { width:32px; height:32px; border-radius:999px; background:var(--paper-warm); border:1px solid var(--line); display:grid; place-items:center; flex-shrink:0; overflow:hidden; padding:0;}
    .av img { width: 24px; height: 24px; display:block; margin:0; animation: days-daisy-spin 9s var(--ease-out) infinite; transform-origin: 50% 50%; transform-box: view-box;}
    .bub { max-width: 72%; padding:12px 16px; line-height:1.55; font:400 15px/1.55 var(--font-sans); color:var(--ink-coffee);}
    .ai { background: var(--bubble-ai); border-radius: 4px 18px 18px 18px;}
    .us { background: var(--bubble-user); border:1px solid var(--bubble-border); border-radius: 18px 4px 18px 18px;}
  </style>
  <div class="row-ai">
    <div class="av"><img src="../assets/daisy-white.svg" alt=""/></div>
    <div class="bub ai">오늘 가장 기억에 남는 순간은 무엇이었나요?</div>
  </div>
  <div class="row-us">
    <div class="bub us">점심 산책에서 본 노란 꽃이 인상 깊었어요.</div>
  </div>
  <div class="row-ai">
    <div class="av"><img src="../assets/daisy-white.svg" alt=""/></div>
    <div class="bub ai" style="color:var(--ink-stone); font-style:italic;">
      <span style="display:inline-flex; gap:4px; align-items:center;">
        <span style="width:5px;height:5px;border-radius:999px;background:var(--gold-warm);animation:days-dot-pulse 1.2s var(--ease-out) infinite;"></span>
        <span style="width:5px;height:5px;border-radius:999px;background:var(--gold-warm);animation:days-dot-pulse 1.2s var(--ease-out) 0.18s infinite;"></span>
        <span style="width:5px;height:5px;border-radius:999px;background:var(--gold-warm);animation:days-dot-pulse 1.2s var(--ease-out) 0.36s infinite;"></span>
      </span>
    </div>
  </div>
</div></body></html>
