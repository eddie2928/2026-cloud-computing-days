<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">brand · iconography · 24×24 · 1.5px</div>
  <style>
    .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px; padding: 4px 0;}
    .ic { display:flex; flex-direction:column; align-items:center; gap:9px; padding:14px 4px; background: var(--paper-cream); border:1px solid var(--line-faint); border-radius:14px; color: var(--ink-walnut);}
    .ic img { width:32px; height:32px; }
    .ic .nm { font:500 11px/1 var(--font-mono); color: var(--ink-bark);}
  </style>
  <div class="grid">
    <div class="ic"><img src="../assets/icons/pencil.svg"/><span class="nm">pencil</span></div>
    <div class="ic"><img src="../assets/icons/eraser.svg"/><span class="nm">eraser</span></div>
    <div class="ic"><img src="../assets/icons/calendar.svg"/><span class="nm">calendar</span></div>
    <div class="ic"><img src="../assets/icons/user.svg"/><span class="nm">user</span></div>
    <div class="ic"><img src="../assets/icons/clock.svg"/><span class="nm">clock</span></div>
    <div class="ic"><img src="../assets/icons/sunrise.svg"/><span class="nm">sun</span></div>
    <div class="ic"><img src="../assets/icons/arrow-right.svg"/><span class="nm">arrow</span></div>
    <div class="ic"><img src="../assets/icons/check.svg"/><span class="nm">check</span></div>
    <div class="ic"><img src="../assets/icons/close.svg"/><span class="nm">close</span></div>
    <div class="ic"><img src="../assets/icons/sparkle.svg"/><span class="nm">plus</span></div>
    <div class="ic" style="color:var(--gold);"><img src="../assets/icons/dot.svg"/><span class="nm" style="color:var(--gold-deep)">dot</span></div>
  </div>
</div></body></html>
