<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">components · progress · dotted leader</div>
  <style>
    .prog { display:flex; flex-direction:column; gap:10px; }
    .prog .line { display:flex; align-items:center; gap:10px; font:500 13px/1 var(--font-sans); color:var(--ink-walnut);}
    .prog .q { width: 28px; color: var(--ink-stone); font-family: var(--font-mono);}
    .prog .leader { flex:1; height:7px; background: radial-gradient(circle, var(--line-strong) 1px, transparent 1.4px) 0 50% / 7px 7px repeat-x;}
    .prog .state { font-family: var(--font-mono); font-size:12px; color: var(--ink-stone);}
    .prog .done .state { color: var(--sage);}
    .prog .cur  .state { color: var(--gold-deep);}
    .prog .cur .q, .prog .done .q { color: var(--ink-coffee);}
    .check { width:14px; height:14px; display:inline-block;}
  </style>
  <div class="prog">
    <div class="line done"><span class="q">Q1</span><span class="leader"></span><span class="state">답변 완료</span></div>
    <div class="line done"><span class="q">Q2</span><span class="leader"></span><span class="state">답변 완료</span></div>
    <div class="line cur"><span class="q">Q3</span><span class="leader"></span><span class="state">답변 중</span></div>
    <div class="line"><span class="q">Q4</span><span class="leader"></span><span class="state">대기</span></div>
    <div class="line"><span class="q">Q5</span><span class="leader"></span><span class="state">대기</span></div>
  </div>
</div></body></html>
