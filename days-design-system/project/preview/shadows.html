<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">shadow · warm-tinted</div>
  <div style="display:flex; gap:18px; padding: 12px 6px 8px;">
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:120px; height:72px; background:var(--paper-cream); border-radius:14px; box-shadow: 0 1px 2px rgba(94,70,30,0.06);"></div>
      <div class="meta">--shadow-1</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:120px; height:72px; background:var(--paper-cream); border-radius:14px; box-shadow: 0 2px 6px rgba(94,70,30,0.08), 0 1px 2px rgba(94,70,30,0.04);"></div>
      <div class="meta">--shadow-2 · card</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:120px; height:72px; background:var(--paper-cream); border-radius:14px; box-shadow: 0 8px 20px -6px rgba(94,70,30,0.14), 0 2px 4px rgba(94,70,30,0.06);"></div>
      <div class="meta">--shadow-3 · raised</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:120px; height:72px; background:var(--paper-cream); border-radius:14px; box-shadow: 0 0 0 4px rgba(214,166,70,0.28); border:1px solid var(--gold-soft);"></div>
      <div class="meta">--shadow-glow</div>
    </div>
  </div>
  <div class="meta" style="padding-top:4px">drop-shadow from a candle · rgba of #5E461E, not black</div>
</div></body></html>
