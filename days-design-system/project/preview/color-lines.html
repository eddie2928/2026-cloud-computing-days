<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">lines · borders & rules</div>
  <div class="row" style="gap: 10px;">
    <div class="swatch"><div class="chip" style="background:#F6EFDF;border-color:#ECE2CB;border-width:1px"></div><div class="name">--line-faint</div><div class="hex">#ECE2CB</div></div>
    <div class="swatch"><div class="chip" style="background:#F6EFDF;border-color:#DDCFB1;border-width:1px"></div><div class="name">--line</div><div class="hex">#DDCFB1</div></div>
    <div class="swatch"><div class="chip" style="background:#F6EFDF;border-color:#C9B68F;border-width:1.5px"></div><div class="name">--line-strong</div><div class="hex">#C9B68F</div></div>
    <div class="swatch"><div class="chip" style="background:#F6EFDF;border-color:#6E5A42;border-width:1px"></div><div class="name">--line-ink</div><div class="hex">#6E5A42</div></div>
  </div>
  <div style="display:flex; flex-direction:column; gap:8px; padding-top:6px;">
    <div class="meta">dotted leader</div>
    <div class="hr-dots" style="width:100%"></div>
    <div class="meta" style="margin-top:6px">hairline</div>
    <hr class="hr-line" style="margin:0;width:100%"/>
  </div>
</div></body></html>
