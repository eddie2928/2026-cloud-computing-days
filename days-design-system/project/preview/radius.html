<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">radius</div>
  <div style="display:flex; gap:16px; align-items:flex-end;">
    <div style="display:flex; flex-direction:column; gap:6px; align-items:center;"><div style="width:60px; height:60px; background:var(--paper-cream); border:1px solid var(--line); border-radius:4px;"></div><div class="meta">--r-1</div><div class="hex" style="font:400 11px/1.2 var(--font-mono); color:var(--ink-stone);">4</div></div>
    <div style="display:flex; flex-direction:column; gap:6px; align-items:center;"><div style="width:60px; height:60px; background:var(--paper-cream); border:1px solid var(--line); border-radius:8px;"></div><div class="meta">--r-2</div><div class="hex" style="font:400 11px/1.2 var(--font-mono); color:var(--ink-stone);">8</div></div>
    <div style="display:flex; flex-direction:column; gap:6px; align-items:center;"><div style="width:60px; height:60px; background:var(--paper-cream); border:1px solid var(--line); border-radius:12px;"></div><div class="meta">--r-3</div><div class="hex" style="font:400 11px/1.2 var(--font-mono); color:var(--ink-stone);">12</div></div>
    <div style="display:flex; flex-direction:column; gap:6px; align-items:center;"><div style="width:60px; height:60px; background:var(--paper-cream); border:1px solid var(--line); border-radius:18px;"></div><div class="meta">--r-4</div><div class="hex" style="font:400 11px/1.2 var(--font-mono); color:var(--ink-stone);">18</div></div>
    <div style="display:flex; flex-direction:column; gap:6px; align-items:center;"><div style="width:60px; height:60px; background:var(--paper-cream); border:1px solid var(--line); border-radius:24px;"></div><div class="meta">--r-5</div><div class="hex" style="font:400 11px/1.2 var(--font-mono); color:var(--ink-stone);">24</div></div>
    <div style="display:flex; flex-direction:column; gap:6px; align-items:center;"><div style="width:120px; height:60px; background:var(--paper-cream); border:1px solid var(--line); border-radius:999px;"></div><div class="meta">--r-pill</div><div class="hex" style="font:400 11px/1.2 var(--font-mono); color:var(--ink-stone);">999</div></div>
  </div>
</div></body></html>
