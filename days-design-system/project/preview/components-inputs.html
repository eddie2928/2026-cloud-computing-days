<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">components · inputs</div>
  <style>
    .field { font:400 15px/1.4 var(--font-sans); width:100%; box-sizing:border-box; padding:8px 10px; background:var(--paper-mist); border:1px solid var(--line); border-radius:12px; color:var(--ink-coffee); outline:none; transition: border-color var(--dur-1), box-shadow var(--dur-1);}
    .field::placeholder { color:var(--ink-stone);}
    .field:focus { border-color:var(--gold); box-shadow: 0 0 0 4px rgba(214,166,70,0.18);}
    label { font:500 12px/1 var(--font-sans); color:var(--ink-bark); letter-spacing:0.04em; display:block; margin-bottom:6px;}
  </style>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div><label>날짜를 선택하세요</label><input class="field" type="date" value="2026-05-22"/></div>
    <div><label>답변</label><textarea class="field" rows="2" placeholder="답변 입력 · Enter 전송, Shift+Enter 줄바꿈"></textarea></div>
  </div>
</div></body></html>
