<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="flex-direction:column; align-items:stretch; gap:10px; padding: 4px 0">
  <div class="label-meta" style="color: var(--ink-meta)">상태/의미를 나타내는 색 (semantic colors)  ·  필수 표시, 위험, 경고, 안내</div>
  <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:stretch">
    <div class="swatch"><div class="fill" style="background:#B5573B"></div><div class="meta"><span class="name">clay  ·  필수 / 위험</span><span class="hex">#B5573B  ·  --accent-clay</span></div></div>
    <div class="swatch"><div class="fill" style="background:#F3DDD2"></div><div class="meta"><span class="name">clay-soft  ·  배경</span><span class="hex">#F3DDD2  ·  --accent-clay-soft</span></div></div>
    <div class="swatch"><div class="fill" style="background:#D9A441"></div><div class="meta"><span class="name">honey  ·  경고</span><span class="hex">#D9A441  ·  --accent-honey</span></div></div>
    <div class="swatch"><div class="fill" style="background:#6C8AA0"></div><div class="meta"><span class="name">sky  ·  안내 / 링크</span><span class="hex">#6C8AA0  ·  --accent-sky</span></div></div>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding-top: 4px">
    <span style="display:inline-flex; align-items:center; gap:6px; padding: 6px 12px; background: var(--accent-clay-soft); color: var(--accent-clay); border-radius: var(--r-pill); font: 500 12px var(--font-sans)">닉네임 <span style="color:var(--accent-clay); font-weight:700">*</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding: 6px 12px; background: transparent; color: var(--accent-clay); border-radius: var(--r-pill); font: 500 12px var(--font-sans)">로그아웃</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding: 6px 12px; background: transparent; color: var(--accent-sky); border-radius: var(--r-pill); font: 500 12px var(--font-sans); border: 1px solid var(--accent-sky)">자세히 보기</span>
  </div>
</div>
</body></html>
