<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="gap: 22px; padding: 12px 4px; align-items:center; flex-wrap:wrap">

  <!-- Primary lockup: outline cloud + wordmark -->
  <div class="col" style="align-items:center; gap:8px">
    <div style="width:200px; height:80px; border-radius: var(--r-4); background: var(--paper-pure); display:flex; align-items:center; justify-content:center; gap:10px; box-shadow: var(--shadow-1)">
      <svg width="36" height="36" viewBox="0 0 64 64" fill="none">
        <path d="M15 41 C9 41 5 36.8 5 31.4 C5 26.4 8.8 22.4 13.8 22.1 C15 17.5 19.4 14 24.6 14 C28.8 14 32.4 16.2 34.2 19.4 C35.8 18.6 37.6 18.2 39.4 18.2 C44.8 18.2 49.2 22.2 49.6 27.2 C53.6 27.6 57 30.8 57 34.6 C57 38.8 53.4 41 49 41 Z" stroke="#475A33" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
      </svg>
      <span style="font-family: var(--font-display); font-weight: 800; font-size: 34px; color: var(--sage-ink); letter-spacing: -0.04em; line-height: 1">Days</span>
    </div>
    <div class="label-meta">primary lockup</div>
  </div>

  <!-- Outline cloud only -->
  <div class="col" style="align-items:center; gap:8px">
    <div style="width:80px; height:80px; border-radius: var(--r-4); background: var(--paper-pure); display:flex; align-items:center; justify-content:center; box-shadow: var(--shadow-1)">
      <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
        <path d="M15 41 C9 41 5 36.8 5 31.4 C5 26.4 8.8 22.4 13.8 22.1 C15 17.5 19.4 14 24.6 14 C28.8 14 32.4 16.2 34.2 19.4 C35.8 18.6 37.6 18.2 39.4 18.2 C44.8 18.2 49.2 22.2 49.6 27.2 C53.6 27.6 57 30.8 57 34.6 C57 38.8 53.4 41 49 41 Z" stroke="#475A33" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="label-meta">cloud (outline)</div>
  </div>

  <!-- Filled cloud (favicon) -->
  <div class="col" style="align-items:center; gap:8px">
    <div style="width:80px; height:80px; border-radius: var(--r-4); background: var(--paper-pure); display:flex; align-items:center; justify-content:center; box-shadow: var(--shadow-1)">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
        <path d="M11 31 C6 31 3 27.6 3 23.5 C3 19.7 5.7 16.7 9.4 16.5 C10.4 13 13.6 10.4 17.5 10.4 C20.6 10.4 23.4 12 24.7 14.4 C25.9 13.8 27.3 13.4 28.7 13.4 C32.7 13.4 36 16.4 36.3 20.2 C39.2 20.6 41.3 22.9 41.3 25.7 C41.3 28.7 39.0 31 35.7 31 Z" fill="#475A33"/>
      </svg>
    </div>
    <div class="label-meta">cloud (filled · favicon)</div>
  </div>

  <!-- Reversed on sage -->
  <div class="col" style="align-items:center; gap:8px">
    <div style="width:200px; height:80px; border-radius: var(--r-4); background: var(--sage-forest); display:flex; align-items:center; justify-content:center; gap:10px; box-shadow: var(--shadow-1)">
      <svg width="36" height="36" viewBox="0 0 64 64" fill="none">
        <path d="M15 41 C9 41 5 36.8 5 31.4 C5 26.4 8.8 22.4 13.8 22.1 C15 17.5 19.4 14 24.6 14 C28.8 14 32.4 16.2 34.2 19.4 C35.8 18.6 37.6 18.2 39.4 18.2 C44.8 18.2 49.2 22.2 49.6 27.2 C53.6 27.6 57 30.8 57 34.6 C57 38.8 53.4 41 49 41 Z" stroke="#FCF6EC" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
      </svg>
      <span style="font-family: var(--font-display); font-weight: 800; font-size: 34px; color: var(--paper-bone); letter-spacing: -0.04em; line-height: 1">Days</span>
    </div>
    <div class="label-meta">on sage</div>
  </div>

</div>
</body></html>
