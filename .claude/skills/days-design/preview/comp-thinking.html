<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body><div class="card" style="gap: 16px; padding: 6px 0">
    <div style="display:flex; gap:8px; align-items:center">
      <div style="width:28px; height:28px; border-radius:50%; background: var(--sage-cloud); display:flex; align-items:center; justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--sage-forest)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18h11a4 4 0 1 0-1-7.9 6 6 0 0 0-11.5 1.4A3.5 3.5 0 0 0 7 18z"/></svg></div>
      <div class="bubble" style="display:inline-flex; gap:5px; align-items:center; min-width:auto">
        <span style="width:6px; height:6px; border-radius:50%; background: var(--sage-leaf); animation: days-thinking 1.2s ease-in-out 0s infinite"></span>
        <span style="width:6px; height:6px; border-radius:50%; background: var(--sage-leaf); animation: days-thinking 1.2s ease-in-out .18s infinite"></span>
        <span style="width:6px; height:6px; border-radius:50%; background: var(--sage-leaf); animation: days-thinking 1.2s ease-in-out .36s infinite"></span>
      </div>
    </div>
    <span class="label-meta">3-dot pulse  ·  no spinners</span>
  </div></body></html>
