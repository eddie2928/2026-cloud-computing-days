<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body><div class="card" style="gap: 14px; padding: 6px 0">
    
      <div class="col" style="align-items:center; gap:6px">
        <div style="width:64px; aspect-ratio:1/1.2; padding:6px 4px; background: transparent; border-radius: var(--r-4); border: 0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:2px; box-shadow: none">
          <span style="font: 500 13px var(--font-sans); color: var(--ink-body)">3</span>
          
        </div>
        <div class="label-meta">empty</div>
      </div>
    
      <div class="col" style="align-items:center; gap:6px">
        <div style="width:64px; aspect-ratio:1/1.2; padding:6px 4px; background: var(--cal-day-bg); border-radius: var(--r-4); border: 0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:2px; box-shadow: var(--shadow-1)">
          <span style="font: 500 13px var(--font-sans); color: var(--ink-body)">5</span>
          <span style="font-size:18px; line-height:1">😊</span>
        </div>
        <div class="label-meta">has entry</div>
      </div>
    
      <div class="col" style="align-items:center; gap:6px">
        <div style="width:64px; aspect-ratio:1/1.2; padding:6px 4px; background: var(--cal-day-bg); border-radius: var(--r-4); border: 0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:2px; box-shadow: var(--shadow-1)">
          <span style="font: 500 13px var(--font-sans); color: var(--ink-body)">11</span>
          <span style="font-size:18px; line-height:1">😩</span>
        </div>
        <div class="label-meta">has entry</div>
      </div>
    
      <div class="col" style="align-items:center; gap:6px">
        <div style="width:64px; aspect-ratio:1/1.2; padding:6px 4px; background: var(--cal-day-bg); border-radius: var(--r-4); border: 2px solid var(--cal-today-ring); display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:2px; box-shadow: var(--shadow-1)">
          <span style="font: 500 13px var(--font-sans); color: var(--sage-forest)">22</span>
          <span style="font-size:18px; line-height:1">😊</span>
        </div>
        <div class="label-meta">today</div>
      </div>
    
      <div class="col" style="align-items:center; gap:6px">
        <div style="width:64px; aspect-ratio:1/1.2; padding:6px 4px; background: transparent; border-radius: var(--r-4); border: 0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:2px; box-shadow: none">
          <span style="font: 500 13px var(--font-sans); color: var(--ink-body)">14</span>
          
        </div>
        <div class="label-meta">empty future</div>
      </div>
    
  </div></body></html>
