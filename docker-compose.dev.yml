services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: localdevpass
      POSTGRES_DB: qnadiary
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d qnadiary"]
      interval: 5s
      timeout: 5s
      retries: 10
